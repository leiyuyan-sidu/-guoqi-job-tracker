<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国央企校招信息看板</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>国央企校招信息看板</h1>
      <p class="updated-hint" id="updated-hint"></p>
    </div>
    <div class="stats">
      <div class="stat-card">
        <div class="num" id="stat-total">-</div>
        <div class="label">可报名岗位</div>
      </div>
      <div class="stat-card muted">
        <div class="num" id="stat-applied">-</div>
        <div class="label">已投递</div>
      </div>
    </div>
  </header>

  <div class="auth-bar" id="auth-bar"></div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-pending" data-tab="pending">待处理 <span id="tab-pending-count"></span></button>
    <button class="tab-btn" id="tab-resolved" data-tab="resolved">已处理记录 <span id="tab-resolved-count"></span></button>
  </div>

  <div class="filters">
    <select id="filter-source"><option value="">全部来源</option></select>
    <input type="date" id="filter-date" title="按处理/新增日期筛选">
    <input type="text" id="filter-search" placeholder="搜索公司或岗位名称">
  </div>

  <div class="chip-row" id="bucket-chips"></div>

  <div class="job-list" id="job-list">
    <div class="loading-state">加载中…</div>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<dialog id="login-dialog">
  <h3>登录</h3>
  <form id="login-form">
    <input type="email" id="login-email" placeholder="邮箱" required>
    <input type="password" id="login-password" placeholder="密码" required>
    <p class="dialog-error" id="login-error"></p>
    <div class="dialog-actions">
      <button type="button" class="secondary" id="login-cancel">取消</button>
      <button type="submit" class="primary">登录</button>
    </div>
  </form>
</dialog>

<dialog id="undecided-dialog">
  <h3>标记待定</h3>
  <form id="undecided-form">
    <textarea id="undecided-reason" rows="3" placeholder="待定原因（选填），比如：还没想好、等其他公司结果"></textarea>
    <div class="dialog-actions">
      <button type="button" class="secondary" id="undecided-cancel">取消</button>
      <button type="submit" class="primary">确认</button>
    </div>
  </form>
</dialog>

<dialog id="skip-dialog">
  <h3>标记不投递</h3>
  <form id="skip-form">
    <div class="radio-group">
      <label><input type="radio" name="skip-reason" value="工资太低"> 工资太低</label>
      <label><input type="radio" name="skip-reason" value="地区不合适"> 地区不合适</label>
      <label><input type="radio" name="skip-reason" value="工作内容不喜欢"> 工作内容不喜欢</label>
      <label><input type="radio" name="skip-reason" value="其他"> 其他</label>
    </div>
    <textarea id="skip-other-reason" rows="2" placeholder="请填写具体原因" class="hidden"></textarea>
    <div class="dialog-actions">
      <button type="button" class="secondary" id="skip-cancel">取消</button>
      <button type="submit" class="primary">确认</button>
    </div>
  </form>
</dialog>

<script src="config.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
